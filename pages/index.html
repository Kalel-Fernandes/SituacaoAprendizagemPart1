<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List - Lista de Tarefas</title>
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <h1>To-Do List</h1>
        <div class="options">
            <div>
                <img src="../img/Container.png" class="iconTask" alt="icon">
            </div>
            <nav>
                <a href="#result">Tarefas</a>
            </nav>
        </div>
    </header>
    <main>
        <h2>Crie uma Nova Tarefa</h2>
        <section class="section1">
            <div class="createTask">
                <div class="form">
                    <label>Nome da Tarefa</label>
                    <input type="text" id="taskName" placeholder="Escreva o nome aqui">
                </div>
                <div class="form">
                    <label>Horas Estimadas</label>
                    <input type="number" step="0.01" id="taskHours" placeholder="0.0">
                </div>
                <div class="form">
                    <label>Valor por Hora</label>
                    <input type="number" id="hourly-rate" placeholder="0.00">
                </div>
                <div class="form">
                    <label>Imposto</label>
                    <input type="text" id="tax" placeholder="0%">
                </div>
                <div class="form">
                    <label>Nível de Urgência</label>
                    <select name="urgency" id="urgency">
                        <option value="low">Baixa</option>
                        <option value="medium">Média</option>
                        <option value="high">Alta</option>
                    </select>
                </div>
                <button type="button" onclick="addTask()">Criar +</button>
            </div>
        </section>
        <section id="result" class="hidden">
            <div class="totalCost">
                <p>Custo Total</p>
                <span id="out-cost"></span>
            </div>
            <div class="totalHoras">
                <p>Total Horas</p>
                <span id="out-hours"></span>
            </div>
        </section>
        <section id="activeTasks">
            <h3>Tarefas Ativas</h3>
            <ul id="taskList"></ul>
        </section>
    </main>
    <br>
    <footer>
        <div class="social">
            <a href="https://github.com/Kalel-Fernandes">
                <i id="github" class="fa-brands fa-github"></i>
            </a>
            <a href="https://www.linkedin.com/in/kalel-f-24213139a/"> 
                <i id="linkedin" class="fa-brands fa-linkedin" target="_blank"></i>
            </a>     
            <a href="https://www.youtube.com/" target="_blank">
                <i id="youtube" class="fa-brands fa-youtube"></i>
            </a>
            <a href="https://www.instagram.com/" target="_blank"> 
                <i id="instagram" class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://web.whatsapp.com/" target="_blank">
                <i id="whatsapp" class="fa-brands fa-whatsapp"></i>
            </a>
        </div>
        <div class="copyright">
            <p class="direitos">© 2026 To-Do List - Todos os direitos reservados.</p>
        </div> 
        <div id="creator">
            <p class="creator">Criador</p>
            <p class="nameCreator">Kalel Fernandes</p>
        </div>
    </footer>
    <script src="../scripts/index.js"></script>
</body>
</html>
